services:
  # ── Bot + tools ──────────────────────────────────────────────────
  agent-brain:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-assistant-pro
    restart: always
    depends_on:
      - llama-service
    volumes:
      - ./workspace:/app/workspace
      - ./memory_db:/app/memory_db
      - ./.env:/app/.env:ro
      - ./.pi/agent:/root/.pi/agent
      - ./credentials:/app/credentials
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - LLAMA_HOST=llama-service:8081
      - WHISPER_HOST=${WHISPER_HOST:-host.docker.internal:8080}
      - WHISPER_LANG=${WHISPER_LANG:-ru}
      - ALLOWED_USER_ID=${ALLOWED_USER_ID}

  # ── Tiny local model for routing (Qwen 3.5-1B via llama.cpp) ─────
  llama-service:
    build:
      context: .
      dockerfile: docker/llama.Dockerfile
    container_name: llama-service
    restart: always
    volumes:
      - ./models:/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── Lightweight cron worker for reminders ──────────────────────────
  cron-worker:
    build:
      context: .
      dockerfile: docker/cron.Dockerfile
    container_name: ai-cron-worker
    restart: always
    volumes:
      - ./workspace:/app/workspace
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - REMINDER_DB=/app/workspace/reminders.json
