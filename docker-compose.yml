services:
  # ── Bot + tools ──────────────────────────────────────────────────
  agent-brain:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-assistant-pro
    restart: always
    depends_on:
      - llama-service
    volumes:
      - ./workspace:/app/workspace
      - ./memory_db:/app/memory_db
      - ./.env:/app/.env:ro
      - ./.pi/agent:/root/.pi/agent
      - ./credentials:/app/credentials
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - LLAMA_HOST=llama-service:8081
      - WHISPER_HOST=${WHISPER_HOST:-host.docker.internal:8080}
      - WHISPER_LANG=${WHISPER_LANG:-ru}
      - ALLOWED_USER_ID=${ALLOWED_USER_ID}

  # ── Tiny local model for routing (Qwen 3.5-1B via llama.cpp) ─────
  llama-service:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-service
    restart: always
    volumes:
      - ./models:/models
    entrypoint: ["sh", "-c"]
    command:
      - |
        MODEL=/models/qwen3.5-1b-q4_k_m.gguf
        if [ ! -f "$MODEL" ]; then
          echo "⬇️  Downloading Qwen 3.5-1B Q4_K_M GGUF (~800 MB)..."
          wget -q --show-progress -O "$MODEL" \
            https://huggingface.co/Qwen/Qwen3.5-1B-GGUF/resolve/main/qwen3.5-1b-q4_k_m.gguf
          echo "✅ Download complete"
        else
          echo "✅ Model already downloaded"
        fi
        exec llama-server --host 0.0.0.0 --port 8081 --model "$MODEL" --ctx-size 2048 --threads 4

  # ── Lightweight cron worker for reminders ──────────────────────────
  cron-worker:
    build:
      context: .
      dockerfile: docker/cron.Dockerfile
    container_name: ai-cron-worker
    restart: always
    volumes:
      - ./workspace:/app/workspace
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - REMINDER_DB=/app/workspace/reminders.json
