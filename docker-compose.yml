services:
  agent-brain:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-assistant-pro
    restart: always
    volumes:
      - ./workspace:/app/workspace
      - ./memory_db:/app/memory_db
      - ./.env:/app/.env:ro
      - ./.pi/agent:/root/.pi/agent
      - ./credentials:/app/credentials
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - OLLAMA_HOST=host.docker.internal:11434
      - WHISPER_HOST=host.docker.internal:8080
      - WHISPER_LANG=${WHISPER_LANG:-ru}
      - ALLOWED_USER_ID=${ALLOWED_USER_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Lightweight cron worker for reminders ──────────────────────────
  cron-worker:
    build:
      context: .
      dockerfile: docker/cron.Dockerfile
    container_name: ai-cron-worker
    restart: always
    volumes:
      - ./workspace:/app/workspace          # shared: reads reminders.json
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - REMINDER_DB=/app/workspace/reminders.json
